{% extends "base.html" %}
{% block title %}{{ action }} Product – Smart Inventory{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-header bg-dark text-white fw-semibold">
        <i class="bi bi-archive me-2"></i>{{ action }} Product
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Name <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control"
                   value="{{ product.name if product else '' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Category</label>
            <input type="text" name="category" class="form-control"
                   value="{{ product.category if product and product.category else '' }}"
                   placeholder="e.g. Electronics, Clothing">
          </div>
          <div class="row mb-3">
            <div class="col">
              <label class="form-label">Price ($) <span class="text-danger">*</span></label>
              <input type="number" name="price" class="form-control" step="0.01" min="0"
                     value="{{ product.price if product else '0.00' }}" required>
            </div>
            <div class="col">
              <label class="form-label">Stock Quantity <span class="text-danger">*</span></label>
              <input type="number" name="stock_quantity" class="form-control" min="0"
                     value="{{ product.stock_quantity if product else '0' }}" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="3">{{ product.description if product and product.description else '' }}</textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-save me-1"></i>{{ action }} Product
            </button>
            <a href="{{ url_for('products') }}" class="btn btn-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
