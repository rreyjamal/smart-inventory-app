{% extends "base.html" %}
{% block title %}{{ action }} Customer – Smart Inventory{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card shadow-sm">
      <div class="card-header bg-dark text-white fw-semibold">
        <i class="bi bi-people me-2"></i>{{ action }} Customer
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Full Name <span class="text-danger">*</span></label>
            <input type="text" name="full_name" class="form-control"
                   value="{{ customer.full_name if customer else '' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Contact Information</label>
            <input type="text" name="contact_information" class="form-control"
                   value="{{ customer.contact_information if customer and customer.contact_information else '' }}"
                   placeholder="Email, phone, etc.">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">
              <i class="bi bi-save me-1"></i>{{ action }} Customer
            </button>
            <a href="{{ url_for('customers') }}" class="btn btn-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
